<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<title>Face Enroll, Presensi & Benchmark</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{font-family:system-ui;margin:16px;color:#111827}
.card{max-width:1500px;margin:auto;border:1px solid #d1d5db;border-radius:12px;padding:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pane{border:1px solid #d1d5db;border-radius:10px;padding:10px}
video,canvas{width:100%;border:1px solid #d1d5db;border-radius:8px}
button{padding:8px 14px;border:none;border-radius:8px;font-weight:700;cursor:pointer}
.primary{background:#2563eb;color:#fff}
.secondary{background:#059669;color:#fff}
.warn{background:#f59e0b;color:#fff}
input,select{padding:6px;border-radius:6px;border:1px solid #d1d5db;width:100%}
textarea{width:100%;min-height:150px;font-family:monospace;font-size:12px}

table{border-collapse:collapse;width:100%;margin-top:10px}
th,td{border:1px solid #d1d5db;padding:6px;text-align:center}
th{background:#f3f4f6}

svg{width:100%;height:200px}

#toast{position:fixed;bottom:20px;right:20px;background:#111827;color:#fff;
padding:12px 16px;border-radius:10px;opacity:0;transition:.3s}
#toast.show{opacity:1}
</style>
</head>

<body>
<div class="card">
<h2>Face Enroll, Presensi & Benchmark Optimasi Data</h2>

<div class="grid">

<!-- ================= LEFT ================= -->
<div class="pane">
<video id="video" autoplay muted playsinline></video>
<canvas id="canvas"></canvas>

<label>Pilih Wajah</label>
<select id="faceSelect"></select>

<label>Nama (Enroll)</label>
<input id="nameInput">

<button id="btnEnroll" class="secondary">Enroll</button>
<button id="btnScan" class="primary">Mulai Scan</button>
<button id="btnStop" class="warn">Stop Scan</button>
<button id="btnBench" class="primary">Benchmark</button>
</div>

<!-- ================= RIGHT ================= -->
<div class="pane">
<h3>Log Presensi</h3>
<textarea id="log" readonly></textarea>

<h3>Benchmark Result (ms)</h3>
<svg id="chart"></svg>

<table>
<thead>
<tr><th>Metode</th><th>Rata-rata (ms)</th></tr>
</thead>
<tbody id="benchTable"></tbody>
</table>
</div>

</div>
</div>

<div id="toast"></div>

<script src="https://docs.opencv.org/4.x/opencv.js"></script>
<script>
/* ================= CONFIG ================= */
const DB_KEY="face_db";
const LOG_KEY="attendance";
const SIZE=100;
const TH=0.85;
const ITER=30;

/* ================= UI ================= */
const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const faceSelect=document.getElementById("faceSelect");
const log=document.getElementById("log");
const toast=document.getElementById("toast");
const chart=document.getElementById("chart");
const benchTable=document.getElementById("benchTable");

/* ================= STATE ================= */
let classifier,gray,rgba;
let detected=[];
let mode="idle";
let rafId=null;

/* ================= UTIL ================= */
const notify=m=>{
  toast.textContent=m;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),2000);
};
const load=k=>JSON.parse(localStorage.getItem(k)||"[]");
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

/* ================= LBP ================= */
function lbp(bytes,w,h){
  const hist=new Float32Array(256);
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    const c=bytes[y*w+x];let code=0;
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)
      if(dx||dy) code=(code<<1)|((bytes[(y+dy)*w+(x+dx)]>=c)?1:0);
    hist[code]++;
  }
  let n=0;for(let v of hist)n+=v*v;n=Math.sqrt(n)||1;
  for(let i=0;i<256;i++)hist[i]/=n;
  return hist;
}
const cosine=(a,b)=>a.reduce((s,v,i)=>s+v*b[i],0);

/* ================= CAMERA ================= */
async function startCamera(){
  const stream=await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject=stream;
  await new Promise(r=>video.onloadedmetadata=r);
  video.play();

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  rgba=new cv.Mat(canvas.height,canvas.width,cv.CV_8UC4);
  gray=new cv.Mat();
}

/* ================= LOOP ================= */
function loop(){
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  if(mode==="scan"){
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    rgba.data.set(img.data);
    cv.cvtColor(rgba,gray,cv.COLOR_RGBA2GRAY);

    const faces=new cv.RectVector();
    classifier.detectMultiScale(gray,faces);
    detected=[];
    faceSelect.innerHTML="";

    for(let i=0;i<faces.size();i++){
      const r=faces.get(i);
      detected.push(r);
      ctx.strokeStyle="#22c55e";
      ctx.strokeRect(r.x,r.y,r.width,r.height);
      faceSelect.innerHTML+=`<option value="${i}">Face ${i}</option>`;
    }

    if(detected.length){
      const r=detected[faceSelect.value||0];
      const roi=gray.roi(r);
      const res=new cv.Mat();
      cv.resize(roi,res,new cv.Size(SIZE,SIZE));
      const desc=lbp(res.data,res.cols,res.rows);

      let best={score:0,name:null};
      load(DB_KEY).forEach(d=>{
        const s=cosine(desc,new Float32Array(d.desc));
        if(s>best.score) best={score:s,name:d.name};
      });

      if(best.score>=TH){
        const att=load(LOG_KEY);
        att.push({name:best.name,score:best.score,time:new Date().toISOString()});
        save(LOG_KEY,att);
        renderLog();
        notify("VERIFIED: "+best.name);
        mode="idle";
      }
    }
  }
  rafId=requestAnimationFrame(loop);
}

function renderLog(){
  log.value=load(LOG_KEY)
    .map((r,i)=>`${i+1}. ${r.name} | ${r.score.toFixed(3)} | ${r.time}`)
    .join("\n");
}

/* ================= BENCHMARK ================= */
function benchmark(){
  if(!detected.length) return notify("Deteksi wajah dulu");

  const r=detected[faceSelect.value||0];
  const img=ctx.getImageData(r.x,r.y,r.width,r.height);

  const result={};

  // Bitmap
  let t0=performance.now();
  for(let i=0;i<ITER;i++){ new ImageData(img.data,img.width,img.height); }
  result.bitmap=(performance.now()-t0)/ITER;

  // Base64
  t0=performance.now();
  for(let i=0;i<ITER;i++){
    const c=document.createElement("canvas");
    c.width=img.width;c.height=img.height;
    c.getContext("2d").putImageData(img,0,0);
    c.toDataURL();
  }
  result.base64=(performance.now()-t0)/ITER;

  // Uint8Array
  t0=performance.now();
  for(let i=0;i<ITER;i++){
    new Uint8Array(img.data.buffer);
  }
  result.uint8=(performance.now()-t0)/ITER;

  renderBenchmark(result);
}

/* ================= RENDER BENCH ================= */
function renderBenchmark(res){
  benchTable.innerHTML="";
  const max=Math.max(...Object.values(res));

  chart.innerHTML="";
  let x=40;
  for(const [k,v] of Object.entries(res)){
    const h=(v/max)*150;
    chart.innerHTML+=`
      <rect x="${x}" y="${180-h}" width="50" height="${h}" fill="#2563eb"/>
      <text x="${x+25}" y="195" text-anchor="middle" font-size="12">${k}</text>
      <text x="${x+25}" y="${170-h}" text-anchor="middle" font-size="12">${v.toFixed(2)}</text>`;
    benchTable.innerHTML+=`<tr><td>${k}</td><td>${v.toFixed(3)}</td></tr>`;
    x+=80;
  }
  notify("Benchmark selesai");
}

/* ================= EVENTS ================= */
btnEnroll.onclick=()=>{
  if(!detected.length) return notify("Tidak ada wajah");
  const name=nameInput.value.trim();
  if(!name) return notify("Nama wajib");

  const r=detected[faceSelect.value||0];
  const roi=gray.roi(r);
  const res=new cv.Mat();
  cv.resize(roi,res,new cv.Size(SIZE,SIZE));
  const desc=lbp(res.data,res.cols,res.rows);

  const db=load(DB_KEY);
  db.push({name,desc:Array.from(desc)});
  save(DB_KEY,db);
  notify("Enroll berhasil");
};

btnScan.onclick=()=>{mode="scan";notify("Scan aktif");};
btnStop.onclick=()=>{mode="idle";notify("Scan berhenti");};
btnBench.onclick=benchmark;

/* ================= INIT ================= */
cv.onRuntimeInitialized=async ()=>{
  classifier=new cv.CascadeClassifier();
  const r=await fetch("https://raw.githubusercontent.com/opencv/opencv/master/data/haarcascades/haarcascade_frontalface_alt2.xml");
  const b=await r.arrayBuffer();
  cv.FS_createDataFile("/", "face.xml", new Uint8Array(b), true,false,false);
  classifier.load("face.xml");
  await startCamera();
  loop();
  renderLog();
};
</script>
</body>
</html>
